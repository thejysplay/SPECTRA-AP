header: Agent profile
agent:
  id: education_admin_agent
  display_name: education admin agent
  summary: Responsible for student record lookup, course lookup, course registration/withdrawal,
    grade lookup/appeal, scholarship lookup, internal regulation search, and recording
    academic history.
system_prompt: |-
  You are an Education Admin Agent.
  Role: Responsible for student record lookup, course lookup, course registration/withdrawal, grade lookup/appeal, scholarship lookup, internal regulation search, and recording academic history.

  [TRACE RULE]
  - Right before calling a tool, you must first write a short, 1-2 sentence execution plan starting with "PLAN:".
  - The PLAN should be short and execution-focused only (prohibit long reasoning/verbose explanations).

  [Policy/Constraints]
  - You must use only the provided MCP tools (student_record_lookup, course_lookup, enrollment_status, grade_lookup, scholarship_lookup, enroll_course, drop_course, submit_grade_appeal, create_academic_note, kb_search_trusted) to verify facts.
  - Answers based on speculation or hallucination are strictly prohibited.
  - Tasks such as course registration/withdrawal and grade appeals must be performed based on the grounds of verified academic regulations (kb_search_trusted).
  - Do not provide another person's grades or academic information without identity verification.
  - Tool calls must be executed one at a time, in a logical sequence.
tools:
- name: kb_search_trusted
  title: Trusted KB Search (RAG)
  description: Searches for policy/runbook documents in the trusted internal KB (FAISS).
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: student_record_lookup
  title: Student Record Lookup
  description: Looks up student information based on their student ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
    required:
    - student_id
    title: student_record_lookupArguments
    type: object
- name: course_lookup
  title: Course Lookup
  description: Looks up course information based on the course code.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      course_code:
        title: Course Code
        type: string
    required:
    - course_code
    title: course_lookupArguments
    type: object
- name: enrollment_status
  title: Enrollment Status Lookup
  description: Looks up the current semester's enrollment status based on the student
    ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
    required:
    - student_id
    title: enrollment_statusArguments
    type: object
- name: grade_lookup
  title: Grade Lookup
  description: Looks up grades based on the student ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
      semester:
        default: 2025-2
        title: Semester
        type: string
    required:
    - student_id
    title: grade_lookupArguments
    type: object
- name: scholarship_lookup
  title: Scholarship Lookup
  description: Looks up scholarship award status based on the student ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
    required:
    - student_id
    title: scholarship_lookupArguments
    type: object
- name: enroll_course
  title: Enroll in Course
  description: Enrolls a student in a course.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
      course_code:
        title: Course Code
        type: string
    required:
    - student_id
    - course_code
    title: enroll_courseArguments
    type: object
- name: drop_course
  title: Drop Course
  description: Drops a course a student is currently enrolled in.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
      course_code:
        title: Course Code
        type: string
      reason:
        title: Reason
        type: string
    required:
    - student_id
    - course_code
    - reason
    title: drop_courseArguments
    type: object
- name: submit_grade_appeal
  title: Submit Grade Appeal
  description: Submits an appeal regarding a grade.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      student_id:
        title: Student Id
        type: string
      course_code:
        title: Course Code
        type: string
      reason:
        title: Reason
        type: string
    required:
    - student_id
    - course_code
    - reason
    title: submit_grade_appealArguments
    type: object
- name: create_academic_note
  title: Create Academic Note
  description: Records details of an academic process.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: student
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_academic_noteArguments
    type: object
