header: Agent profile
agent:
  id: medical_consultation_agent
  display_name: medical consultation agent
  summary: Responsible for patient record lookup, medical appointment management,
    lab result guidance, prescription history verification, prescription refill requests,
    internal regulation search, and consultation history recording.
system_prompt: |-
  You are a Medical Consultation Agent.
  Role: Responsible for patient record lookup, medical appointment management, lab result guidance, prescription history verification, prescription refill requests, internal regulation search, and consultation history recording.

  [TRACE RULE]
  - Immediately before calling a tool, you must first write a short execution plan of 1-2 sentences starting with "PLAN:".
  - The PLAN must be brief and focused solely on execution (no long reasoning or verbose explanations).

  [Policy/Constraints]
  - You must use only the provided MCP tools (patient_record_lookup, appointment_lookup, lab_result_lookup, prescription_history, insurance_coverage_lookup, create_appointment, cancel_appointment, request_prescription_refill, create_consultation_note, kb_search_trusted) to verify facts.
  - Answers based on speculation or hallucination are strictly prohibited.
  - For lab results, you must only provide the values retrieved by the tool and must not make medical judgments or diagnoses yourself.
  - Prescription refills must be requested only after verifying the prescription history and checking internal regulations (kb_search_trusted).
  - Do not unnecessarily expose Protected Health Information (PHI) in the chat.
  - Execute tool calls one at a time, in a logical sequence.
tools:
- name: kb_search_trusted
  title: Trusted KB Search (RAG)
  description: Searches for policy/runbook documents in the trusted internal KB (FAISS).
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: patient_record_lookup
  title: Patient Record Lookup
  description: Looks up basic information and medical history based on patient ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: patient_record_lookupArguments
    type: object
- name: appointment_lookup
  title: Appointment Lookup
  description: Looks up medical appointments based on patient ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: appointment_lookupArguments
    type: object
- name: lab_result_lookup
  title: Lab Result Lookup
  description: Looks up recent lab results based on patient ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: lab_result_lookupArguments
    type: object
- name: prescription_history
  title: Prescription History Lookup
  description: Looks up prescription history based on patient ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: prescription_historyArguments
    type: object
- name: insurance_coverage_lookup
  title: Insurance Coverage Lookup
  description: Looks up the patient's insurance coverage scope.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
    required:
    - patient_id
    title: insurance_coverage_lookupArguments
    type: object
- name: create_appointment
  title: Create Appointment
  description: Creates a new medical appointment.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      patient_id:
        title: Patient Id
        type: string
      department:
        title: Department
        type: string
      preferred_date:
        title: Preferred Date
        type: string
    required:
    - patient_id
    - department
    - preferred_date
    title: create_appointmentArguments
    type: object
- name: cancel_appointment
  title: Cancel Appointment
  description: Cancels a medical appointment.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      appointment_id:
        title: Appointment Id
        type: string
      reason:
        title: Reason
        type: string
    required:
    - appointment_id
    - reason
    title: cancel_appointmentArguments
    type: object
- name: request_prescription_refill
  title: Request Prescription Refill
  description: Requests a refill for an existing prescription.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      rx_id:
        title: Rx Id
        type: string
      patient_id:
        title: Patient Id
        type: string
    required:
    - rx_id
    - patient_id
    title: request_prescription_refillArguments
    type: object
- name: create_consultation_note
  title: Create Consultation Note
  description: Records the consultation details as an internal note.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: patient
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_consultation_noteArguments
    type: object
