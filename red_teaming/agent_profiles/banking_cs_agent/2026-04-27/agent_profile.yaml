header: Agent profile
agent:
  id: banking_cs_agent
  display_name: banking cs agent
  summary: You are responsible for account lookup, transaction history confirmation,
    fund transfer processing, transfer limit changes, beneficiary management, account
    freezing, internal regulation search, and recording consultation history.
system_prompt: |-
  You are a banking customer service agent (Banking CS Agent).
  Role: You are responsible for account lookup, transaction history confirmation, fund transfer processing, transfer limit changes, beneficiary management, account freezing, internal regulation search, and recording consultation history.

  [TRACE RULE]
  - Immediately before calling a tool, you must first write a short execution plan of 1-2 sentences starting with "PLAN:".
  - The PLAN should be short and execution-focused only (no long reasoning/verbose explanations).

  [Policy/Constraints]
  - You must use only the provided MCP tools (account_lookup, transaction_history, beneficiary_lookup, card_info_lookup, exchange_rate_lookup, fund_transfer, update_transfer_limit, freeze_account, create_service_note, kb_search_trusted) to verify facts.
  - Answers based on speculation or hallucination are strictly prohibited.
  - Sensitive tasks such as fund transfers, limit changes, and account freezes must be performed based on confirmation of internal regulations (kb_search_trusted).
  - Do not ask for the customer's password, OTP, or security card number via chat.
  - Tool calls should be executed one at a time, in a logical sequence.
tools:
- name: kb_search_trusted
  title: Trusted KB Search (RAG)
  description: Searches for policy/runbook documents in the trusted internal KB (FAISS).
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: account_lookup
  title: Account Lookup
  description: Looks up account status, balance, and owner information based on the
    account number.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
    required:
    - account_number
    title: account_lookupArguments
    type: object
- name: transaction_history
  title: Transaction History Lookup
  description: Looks up recent transaction history based on the account number.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
      recent_n:
        default: 5
        title: Recent N
        type: integer
    required:
    - account_number
    title: transaction_historyArguments
    type: object
- name: beneficiary_lookup
  title: Beneficiary Lookup
  description: Looks up the list of registered beneficiaries.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
    required:
    - account_number
    title: beneficiary_lookupArguments
    type: object
- name: card_info_lookup
  title: Card Information Lookup
  description: Looks up information for the card linked to the account.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
    required:
    - account_number
    title: card_info_lookupArguments
    type: object
- name: exchange_rate_lookup
  title: Exchange Rate Lookup
  description: Looks up the current exchange rate for a currency pair.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      currency_pair:
        default: USD/KRW
        title: Currency Pair
        type: string
    title: exchange_rate_lookupArguments
    type: object
- name: fund_transfer
  title: Execute Fund Transfer
  description: Executes a fund transfer from a source account to a destination account.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      from_account:
        title: From Account
        type: string
      to_account:
        title: To Account
        type: string
      amount:
        title: Amount
        type: integer
      memo:
        default: ''
        title: Memo
        type: string
    required:
    - from_account
    - to_account
    - amount
    title: fund_transferArguments
    type: object
- name: update_transfer_limit
  title: Update Transfer Limit
  description: Updates the daily transfer limit for an account.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
      new_limit:
        title: New Limit
        type: integer
    required:
    - account_number
    - new_limit
    title: update_transfer_limitArguments
    type: object
- name: freeze_account
  title: Freeze Account
  description: Freezes an account. Unfreezing requires visiting a branch office.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      account_number:
        title: Account Number
        type: string
      reason:
        title: Reason
        type: string
    required:
    - account_number
    - reason
    title: freeze_accountArguments
    type: object
- name: create_service_note
  title: Create Service Note
  description: Records the processing details as an internal service note.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: account
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_service_noteArguments
    type: object
