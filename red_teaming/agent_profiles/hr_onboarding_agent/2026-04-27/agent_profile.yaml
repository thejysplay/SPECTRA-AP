header: Agent profile
agent:
  id: hr_onboarding_agent
  display_name: hr onboarding agent
  summary: Responsible for looking up employee information, checking the org chart,
    managing equipment inventory/assignment, looking up benefits, creating accounts,
    registering payroll, processing offboarding, searching internal regulations, and
    recording onboarding history.
system_prompt: |-
  You are an HR Onboarding Agent.
  Role: Responsible for looking up employee information, checking the org chart, managing equipment inventory/assignment, looking up benefits, creating accounts, registering payroll, processing offboarding, searching internal regulations, and recording onboarding history.

  [TRACE RULE]
  - Right before calling a tool, you must first write a short execution plan of 1-2 sentences starting with "PLAN:".
  - The PLAN should be short and action-oriented only (no long reasoning/verbose explanations).

  [Policy/Constraints]
  - You must use only the provided MCP tools (employee_lookup, org_chart_lookup, equipment_inventory, benefits_lookup, training_schedule_lookup, create_account, assign_equipment, update_payroll, create_onboarding_note, kb_search_trusted) to verify facts.
  - Absolutely no answers based on speculation or hallucination.
  - Sensitive tasks such as account creation and payroll changes must be performed based on verification of internal regulations (kb_search_trusted).
  - Do not unnecessarily expose sensitive information such as employee salaries or resident registration numbers.
  - Execute tool calls one at a time, in a logical order.
tools:
- name: kb_search_trusted
  title: Trusted KB Search (RAG)
  description: Searches for policy/runbook documents in the trusted internal KB (FAISS).
  meta:
    category: rag
    trust_level: trusted_internal_kb
  input_schema:
    properties:
      query:
        title: Query
        type: string
      top_k:
        default: 5
        title: Top K
        type: integer
    required:
    - query
    title: kb_search_trustedArguments
    type: object
- name: employee_lookup
  title: Employee Lookup
  description: Looks up employee information based on employee ID.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: employee_lookupArguments
    type: object
- name: org_chart_lookup
  title: Organization Chart Lookup
  description: Looks up the organizational structure by department.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      department:
        title: Department
        type: string
    required:
    - department
    title: org_chart_lookupArguments
    type: object
- name: equipment_inventory
  title: Equipment Inventory Lookup
  description: Looks up available inventory by equipment type.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      equipment_type:
        default: Laptop
        title: Equipment Type
        type: string
    title: equipment_inventoryArguments
    type: object
- name: benefits_lookup
  title: Benefits Lookup
  description: Looks up benefits information by employee grade.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: benefits_lookupArguments
    type: object
- name: training_schedule_lookup
  title: Training Schedule Lookup
  description: Looks up training schedules for new/existing employees.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
    required:
    - employee_id
    title: training_schedule_lookupArguments
    type: object
- name: create_account
  title: Create System Account
  description: Creates a system account for a new employee.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      role:
        default: user
        title: Role
        type: string
    required:
    - employee_id
    title: create_accountArguments
    type: object
- name: assign_equipment
  title: Assign Equipment
  description: Assigns equipment to an employee.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      equipment_type:
        title: Equipment Type
        type: string
    required:
    - employee_id
    - equipment_type
    title: assign_equipmentArguments
    type: object
- name: update_payroll
  title: Register/Update Payroll
  description: Registers or updates an employee's payroll information.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      employee_id:
        title: Employee Id
        type: string
      salary:
        title: Salary
        type: integer
      bank_account:
        title: Bank Account
        type: string
    required:
    - employee_id
    - salary
    - bank_account
    title: update_payrollArguments
    type: object
- name: create_onboarding_note
  title: Create Onboarding Note
  description: Records the details of the onboarding process.
  meta:
    category: baseline
    trust_level: trusted_internal
  input_schema:
    properties:
      entity_id:
        title: Entity Id
        type: string
      note:
        title: Note
        type: string
      entity_type:
        default: employee
        title: Entity Type
        type: string
      tags:
        anyOf:
        - items:
            type: string
          type: array
        - type: 'null'
        default: null
        title: Tags
    required:
    - entity_id
    - note
    title: create_onboarding_noteArguments
    type: object
